<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>海米尔文化 - 官方公告栏</title>
    <meta name="description" content="海米尔文化官方公告栏，发布公司最新动态、版权业务通知、活动资讯及重要声明。">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a0b0b 0%, #2d1a1a 100%);
            color: #f0e6d2;
            line-height: 1.7;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 主容器 */
        .announcement-page {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 头部导航区 */
        .page-header {
            margin-bottom: 35px;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 2px solid rgba(251, 197, 0, 0.4);
            padding-bottom: 20px;
        }
        .title-section h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, #fff, #FBC500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .title-section h1::before {
            content: "📢";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #FBC500;
        }
        .back-home {
            background: rgba(251, 197, 0, 0.15);
            backdrop-filter: blur(6px);
            padding: 8px 20px;
            border-radius: 40px;
            transition: 0.25s;
            border: 1px solid rgba(251, 197, 0, 0.4);
        }
        .back-home a {
            color: #FBC500;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-home:hover {
            background: #cc0000;
            border-color: #FBC500;
            transform: translateY(-3px);
        }
        .back-home:hover a {
            color: #fff;
        }

        /* 公告列表网格 / 卡片样式 */
        .announcements-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 20px;
        }

        .announcement-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid rgba(251, 197, 0, 0.2);
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .announcement-card:hover {
            transform: translateY(-6px);
            border-color: rgba(251, 197, 0, 0.6);
            box-shadow: 0 20px 35px rgba(251, 197, 0, 0.2);
            background: rgba(255, 255, 255, 0.07);
        }

        .card-inner {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 标签 + 标题行 */
        .card-badge-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .badge {
            background: #cc0000;
            color: #FBC500;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 14px;
            border-radius: 30px;
            letter-spacing: 1px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .announcement-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FBC500;
            line-height: 1.3;
            transition: 0.2s;
        }
        .announcement-summary {
            color: #e0d3c2;
            font-size: 1rem;
            margin: 4px 0;
            line-height: 1.6;
            border-left: 3px solid #FBC500;
            padding-left: 15px;
        }
        .announcement-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 8px;
            gap: 15px;
        }
        .announcement-date {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #ffb485;
            background: rgba(0,0,0,0.3);
            padding: 5px 14px;
            border-radius: 30px;
        }
        .detail-link {
            background: linear-gradient(95deg, #cc0000, #a00000);
            color: #FBC500;
            padding: 8px 22px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .detail-link:hover {
            background: #FBC500;
            color: #1a0b0b;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(251, 197, 0, 0.4);
        }

        /* 无公告占位 */
        .empty-state {
            text-align: center;
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 60px 20px;
            margin-top: 60px;
            font-size: 1.2rem;
            color: #FBC500;
        }

        /* footer 简洁样式 */
        .footer-note {
            margin-top: 60px;
            text-align: center;
            border-top: 1px solid rgba(251, 197, 0, 0.2);
            padding-top: 30px;
            font-size: 0.85rem;
            color: #f0cca0;
        }
        .footer-note a {
            color: #FBC500;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            body { padding: 20px 16px; }
            .card-inner { padding: 18px 20px; }
            .announcement-title { font-size: 1.3rem; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .announcement-meta { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="announcement-page">
    <div class="page-header">
        <div class="title-section">
            <h1>海米尔文化 · 官方公告栏</h1>
            <p style="color: #ffb485; margin-top: 8px;">公司动态 · 版权通告 · 活动资讯 · 重要声明</p>
        </div>
        <div class="back-home">
            <a href="/" target="_self">
                <span>🏠</span> 返回官网首页
            </a>
        </div>
    </div>

    <!-- 公告列表容器 -->
    <div class="announcements-grid" id="announcementGrid">
        <!-- 动态注入公告卡片 -->
        <div class="empty-state" style="display: none;" id="loadingPlaceholder">⏳ 加载公告中...</div>
    </div>

    <div class="footer-note">
        <p>© 2025-2026 吉林海米尔文化传播有限公司 | 保持年轻视角，共创无限可能</p>
        <p style="margin-top: 10px;"><a href="/">海米尔文化官方网站</a> &nbsp;|&nbsp; <a href="mailto:us@haimier.top">意见反馈</a></p>
    </div>
</div>

<script>
    // ========================
    // 海米尔文化 全量公告数据
    // 每条公告包含: id, badge(标签), title(标题), summary(简要内容), date(发布日期), link(单独跳转链接)
    // 每条公告都可单独跳转 (link字段可指向详情页或微信文章/内部页面)
    // ========================
    const FULL_ANNOUNCEMENTS = [
        {
            id: 1,
            badge: "重要",
            title: "关于海米尔文化于2026年6月1日起停用分支彩蛋页面、并更新网站的公告",
            summary: "为进一步优化网站、节省资源，海米尔文化将于2026年6月1日起删除撤销彩蛋页面、并对主域名做出更新处理。",
            date: "2026年04月24日",
            link: "https://haimier.top/announcementList/E260424001/"
        },
         {
            id: 1,
            badge: "重要",
            title: "关于海米尔文化账号注销迁移的公告",
            summary: "为业务升级，海米尔文化将对账号做出注销迁移处理",
            date: "2026年04月26日",
            link: "https://haimier.top/announcementList/E260426001/"
        },
    ];

    /**
     * 将公告数组渲染为卡片列表，每条卡片均包含独立跳转按钮
     * 支持 HTML 内容，但为安全保持文本为主，链接自动处理
     */
    function renderAllAnnouncements() {
        const gridContainer = document.getElementById('announcementGrid');
        if (!gridContainer) return;

        // 隐藏加载占位
        const placeholder = document.getElementById('loadingPlaceholder');
        if (placeholder) placeholder.style.display = 'none';

        if (!FULL_ANNOUNCEMENTS || FULL_ANNOUNCEMENTS.length === 0) {
            gridContainer.innerHTML = `<div class="empty-state">📭 暂无公告，敬请期待最新动态～</div>`;
            return;
        }

        // 生成所有卡片（按日期倒序，让最新的在前面）
        const sortedData = [...FULL_ANNOUNCEMENTS].sort((a,b) => {
            // 简单日期倒序（字符串格式yyyy年mm月dd日可比较）
            return b.date.localeCompare(a.date);
        });

        const cardsHTML = sortedData.map(ann => {
            // 对summary做简单防XSS（但允许安全链接辅助）
            const safeSummary = ann.summary.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
            const safeTitle = ann.title.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });

            // 单独跳转链接 (支持 http/https/mailto/相对路径)
            let detailUrl = ann.link && ann.link.trim() !== '' ? ann.link : '#';
            // 如果链接是空或者#，给一个默认行为不代表跳转失效，但仍然保留按钮
            const linkTarget = (detailUrl.startsWith('http') || detailUrl.startsWith('mailto') || detailUrl.startsWith('/')) ? '_blank' : '_self';
            // 针对mailto链接，允许新窗口不强制（但一般浏览器正常）
            const relAttr = detailUrl.startsWith('http') ? ' rel="noopener noreferrer"' : '';

            return `
                <div class="announcement-card" data-id="${ann.id}">
                    <div class="card-inner">
                        <div class="card-badge-row">
                            <span class="badge">${ann.badge}</span>
                            <div class="announcement-title">${safeTitle}</div>
                        </div>
                        <div class="announcement-summary">
                            ${safeSummary}
                        </div>
                        <div class="announcement-meta">
                            <span class="announcement-date"><span>📅</span> ${ann.date}</span>
                            <a href="${detailUrl}" target="${linkTarget}"${relAttr} class="detail-link">
                                查看详情 <span>→</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        gridContainer.innerHTML = cardsHTML;
    }

    // 支持动态刷新 (如果未来需要从接口拉取数据，可在此扩展)
    document.addEventListener('DOMContentLoaded', () => {
        renderAllAnnouncements();
        // 可选：为返回首页的链接适配（若网站部署在子目录，可微调"/"）
        const homeLink = document.querySelector('.back-home a');
        if (homeLink && homeLink.getAttribute('href') === '/') {
            // 保持相对根目录，不做额外处理
        }
        console.log('✅ 独立公告栏页面已加载，支持每条公告单独跳转');
    });
</script>
</body>
</html>
